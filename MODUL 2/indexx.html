<!DOCTYPE html>
<html>
<head>
    <title>Halaman Utama</title>
    <style>
        /*animasi bg*/
        body {
            margin: 0;
            padding: 0;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        
            background: linear-gradient(
                -45deg,
                #8a2be2,
                #ff69b4,
                #00bfff,
                #7fff00
            );

            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            padding: 40px;
        }
        /*animasi bg*/
        @keyframes gradientBG {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }
        }

        h1 {
            color: yellow;
            font-size: 45px;
            text-shadow: 2px 2px 5px black;
        }

        p  {
            font-size: 24px;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 7px 0;
        }

        a  { /*button*/
            font-size: 20px;
            text-decoration: none;
            color: white;
            background: rgba(255, 136, 0, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            transition: 0.3s;
        } 
        /*efek animasi */
        a:hover {
            background: white;
            color: #8a2be2;
            transform: translateX(10px);
            box-shadow: 0 5px 15px rgba(212, 0, 255, 0.3);
        }
        .judul{
            font-family: cinzel;
            font-size: 60px;
        
        }
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 35px;
        }
        .btn {
            background: #dcd5ff;
            color: #433a84;
            padding: 14px 34px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        .btn-right{
            position: fixed;
            bottom: 30px;
            right: 30px;
            text-align: right;
        }
        .back-btn {
        margin-top: 30px;
        text-decoration: none;
        color: white;
        background-color: #672eb8;
        padding: 10px 20px;
        border: 2px solid white;
        border-radius: 10px;
        display: inline-block;
        transition: 0.3s;
        font-weight: bold;
        }
        .back-btn:hover {
        background-color: white;
        color: #2563eb;
        border: 2px solid #2563eb;
        }
    </style>
</head>
<body>
    <h1 class="judul">Selamat Datang di Website Saya</h1>
    <p>Silakan pilih halaman :</p>

<ul>

    <li><a href="bahan.html">Cara Membuat Telur</a></li><br>

    <li><a href="snack.html">Aneka Snack</a></li><br>
    <li><a href="tabel.html">Tabel</a></li><br>
</ul>
</ul>
</ul>
</ul>
<div class="btn-right">
    <a href="index.html" class="back-btn">Back</a></div>
</body>
</html>
