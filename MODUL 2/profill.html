<!doctype html>
<html lang="id">
<head>

    <title> Biodata</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family:'Courier New', Courier, monospace;
        /*bg kertas */
            background: url("C:/Users/akuni/Downloads/kertas.png") no-repeat center center fixed;
            background-size: cover;
            animation: bgMove 3s ease-in-out infinite alternate;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        /*animasi bg gerak halus*/
        @keyframes bgMove{
            0%{
                background-position: center top;
                transform: scale(1);
            }
            50%{
                background-position: center center;
                transform: scale(1.02);
            }
            100%{
                background-position: center bottom;
                transform: scale(1.04);
            }
        }
    .container{
        width: 80%;
        max-width: 900px;
       
        background: rgba(255, 255, 255, 0.15);
        padding: 35px;
        border-radius: 20px;
        backdrop-filter: blur(5px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    h1{
        text-align: center;
        color: white;
    }

    .foto {
        display: block;
        margin: 0 auto;
        width: 200px;
        height: 350px;
        object-fit: cover;
        border: 4px solid white;
        border-radius: 15px;
        box-shadow: 2px 2px 10px gray;
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        color: white;
        font-size: 18px;
    }

    td{
        padding: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        vertical-align: top;
    }

    td:first-child{
        width: 220px;
        font-weight: bold;
    }

    .heading-box{
        margin-bottom: 10px;
        text-align: center;
        color: white;
        line-height: 1.8;
    }
    .btn-right{
        text-align: right;
    }
    .back-btn {
        margin-top: 30px;
        text-decoration: none;
        color: white;
        background-color: #2563eb;
        padding: 10px 20px;
        border: 2px solid white;
        border-radius: 10px;
        display: inline-block;
        transition: 0.3s;
        font-weight: bold;
    }
    .back-btn:hover {
        background-color: white;
        color: #2563eb;
        border: 2px solid #2563eb;
    }
    </style>
</head>
<body>
    <div class="container">

       <div class="heading-box">
