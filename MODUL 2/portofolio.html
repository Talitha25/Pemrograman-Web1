<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="Viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body{
            background: #5f56a8;
            min-height: 100vh;
            width: 100%; 
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .main{
            width: 1400px;
            color: white;
        }
    
        .hero {
            background: #766bd2;
            border-radius: 35px;
            padding: 35px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 35px;
        }
        .btn {
            background: #dcd5ff;
            color: #433a84;
            padding: 14px 34px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }
        .btn-right{
            position: fixed;
            bottom: 30px;
            right: 30px;
            text-align: right;
        }
        .back-btn {
        margin-top: 30px;
        text-decoration: none;
        color: white;
        background-color: #672eb8;
        padding: 10px 20px;
        border: 2px solid white;
        border-radius: 10px;
        display: inline-block;
        transition: 0.3s;
        font-weight: bold;
        }
        .back-btn:hover {
        background-color: white;
        color: #2563eb;
        border: 2px solid #2563eb;
        }
        .box {
            background: rgba(255,255,255,0.18);
            border-radius: 25px;
            padding: 25px;
            line-height: 1.7;
            min-height: 180px;
        }
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .galaxy-card {
            background: rgba(255,255,255,0.15);
            border-radius: 25px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            text-decoration: none;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
            cursor: pointer;
        }
        .galaxy-card:hover{
            transform: translateY(-5px);
            background: rgba(255,255,255,0.25);
        }
        footer {
            text-align: center;
            margin-top: 30px;
            letter-spacing: 6px;
            font-size: 14px;
            opacity: 0.9;
        }
        .section {
            background: #766bd2;
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.18);
        }
         .portofolio{
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
<div class="main">
    <div class="hero">
    <div class="left">
    </div>
</div>
<div class="portofolio">PORTOFOLIO</div>
 <div class="section">
    <div class="gallery">
      <a href="indexx.html" class="galaxy-card">MODUL 1</a>
      <a href="indexcss.html" class="galaxy-card">MODUL 2</a>
    </div>
  </div>
  <footer>
    CREATED BY TALITHA
  </footer>

</div>
 <div class="btn-right">
            <a href="index.html" class="back-btn">Back</a>
        </div>
</body>
</html>
